<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Block Clipper - All Clips</title>
  <style>
    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      overflow: hidden;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f5f5f5;
      display: flex;
      flex-direction: column;
    }

    header {
      padding: 16px 24px;
      background: #fff;
      border-bottom: 1px solid #e5e5e5;
      flex-shrink: 0;
    }

    h1 {
      margin: 0 0 12px 0;
      font-size: 20px;
    }

    #search {
      width: 100%;
      max-width: 400px;
      padding: 8px 12px;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-size: 14px;
    }

    #search:focus {
      outline: none;
      border-color: #3498db;
    }

    #export-buttons {
      display: flex;
      align-items: center;
    }

    .export-button {
      padding: 6px 12px;
      background: #3498db;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 13px;
      transition: background 0.15s;
    }

    .export-button:hover {
      background: #2980b9;
    }

    main {
      flex: 1;
      overflow-y: auto;
      padding: 16px 24px;
    }

    #clips {
      display: grid;
      gap: 10px;
    }

    .clip-card {
      padding: 12px 16px;
      background: #fff;
      border: 1px solid #e5e5e5;
      border-radius: 6px;
      cursor: pointer;
      transition: box-shadow 0.15s;
    }

    .clip-card:hover {
      box-shadow: 0 2px 6px rgba(0,0,0,0.08);
    }

    .clip-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 6px;
    }

    .clip-title {
      font-weight: 500;
      font-size: 14px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      flex: 1;
      color: #333;
    }

    .clip-header-right {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-left: 10px;
      flex-shrink: 0;
    }

    .clip-time {
      font-size: 11px;
      color: #999;
      white-space: nowrap;
    }

    .delete-icon-button {
      background: none;
      border: none;
      cursor: pointer;
      padding: 2px 6px;
      font-size: 14px;
      opacity: 0.6;
      transition: opacity 0.15s;
      border-radius: 4px;
    }

    .delete-icon-button:hover {
      opacity: 1;
      background: #fff5f5;
    }

    .clip-preview {
      font-size: 12px;
      color: #666;
      margin: 0 0 6px 0;
      overflow: hidden;
      text-overflow: ellipsis;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      line-height: 1.4;
    }

    .clip-source {
      font-size: 11px;
      color: #999;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    #detail {
      display: none;
    }

    #detail.active {
      display: block;
    }

    .detail-header {
      margin-bottom: 12px;
    }

    .back-button {
      padding: 8px 0;
      background: none;
      border: none;
      cursor: pointer;
      font-size: 14px;
      color: #3498db;
    }

    .back-button:hover {
      text-decoration: underline;
    }

    .detail-content {
      background: #fff;
      padding: 16px;
      border-radius: 6px;
      border: 1px solid #e5e5e5;
    }

    .detail-content h2 {
      margin: 0 0 12px 0;
      font-size: 18px;
      word-break: break-word;
    }

    .detail-meta {
      margin-bottom: 12px;
      padding-bottom: 12px;
      border-bottom: 1px solid #e5e5e5;
      font-size: 12px;
      color: #666;
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
    }

    .detail-meta a {
      color: #3498db;
    }

    .detail-meta a:hover {
      text-decoration: underline;
    }

    pre {
      background: #f9f9f9;
      padding: 12px;
      border-radius: 4px;
      overflow-x: auto;
      white-space: pre-wrap;
      word-wrap: break-word;
      font-family: 'SF Mono', Monaco, 'Cascadia Code', monospace;
      font-size: 13px;
      line-height: 1.5;
      max-height: calc(100vh - 250px);
      overflow-y: auto;
    }

    .loading, .empty {
      text-align: center;
      padding: 40px 20px;
      color: #666;
    }

    .empty h2 {
      margin: 0 0 8px 0;
      font-size: 18px;
    }

    .detail-actions {
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px solid #e5e5e5;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .export-single-button {
      padding: 6px 12px;
      background: #3498db;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 13px;
    }

    .export-single-button:hover {
      background: #2980b9;
    }

    .delete-button {
      padding: 6px 12px;
      background: #dc3545;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 13px;
    }

    .delete-button:hover {
      background: #c82333;
    }
  </style>
</head>
<body>
  <header>
    <h1>📋 Block Clipper</h1>
    <input type="text" id="search" placeholder="Search clips...">
    <div id="export-buttons" style="display: none; margin-top: 12px; gap: 8px;">
      <span style="font-size: 12px; color: #666; align-self: center;">
        Export <span id="export-count">0</span>:
      </span>
      <button id="export-json" class="export-button">JSON</button>
      <button id="export-markdown" class="export-button">Markdown</button>
    </div>
  </header>

  <main>
    <div id="list">
      <div class="loading">Loading...</div>
    </div>

    <div id="detail">
      <div class="detail-header">
        <button class="back-button" id="back">← Back to list</button>
      </div>
      <div class="detail-content" id="detail-content">
        <!-- Detail content will be inserted here -->
      </div>
    </div>
  </main>

  <script type="module" src="options.js"></script>
</body>
</html>
