schema: spec-driven

context: |
  Project: Block Clipper - A browser extension for content clipping and distribution

  Tech Stack:
  - WXT (https://wxt.dev) - Web Extension Framework for building Chrome/Firefox/Safari/Edge extensions with Vite
    - Not related to Mozilla WXT, it's a modern framework by Aklinker1
    - Supports Manifest V3, TypeScript, React, Vue, Solid, Svelte
    - Provides HMR, auto-imports, TypeScript APIs, and content script UI
  - React 19
  - TypeScript 5.9
  - IndexedDB for storage

  Architecture:
  - Content Scripts: Capture content from web pages
  - Background Service Worker: Handle storage and exports
  - Sidebar UI: Main interface for browsing and managing clipped items
  - Popup UI: Quick actions and simple status display only

  Core Concepts:
  - Block-based content model (inspired by Notion/Contentful)
  - Unified storage abstraction layer over IndexedDB
  - Export as distribution pipeline (JSON/Markdown)

  WXT-Specific Notes:
  - Uses defineBackground(), defineContentScript() wrappers
  - Pre-rendering happens during build (browser APIs may not be available)
  - HMR enabled for faster development
  - Auto-generates manifest.json from config

  Conventions:
  - Code: English only (variables, functions, comments)
  - Documentation:
    - AI-generated artifacts (proposal, design, tasks): English
    - Human-written docs (README, guides): Chinese
    - Discussion and comments: Chinese
  - Use Async/Await for asynchronous operations
  - Error handling with user-friendly messages

  Non-goals:
  - No server-side backend (pure client-side)
  - No user authentication (MVP)
  - No real-time sync features

rules:
  proposal:
    - Always include "Success Criteria" section
    - Keep "Non-goals" explicit
    - Use Chinese for descriptions

  design:
    - Include data flow diagrams where applicable
    - Specify IndexedDB schema explicitly
    - Consider MV3 constraints
    - Define Sidebar vs Popup responsibilities clearly

  tasks:
    - Break down into 2-4 hour chunks
    - Include testing tasks
    - Mark dependencies between tasks
